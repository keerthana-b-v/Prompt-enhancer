<svg width="100%" viewBox="0 0 900 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>PromptRoute Architecture — High-Fidelity Flow</title>
  <desc>Visualizes the PromptRoute browser extension prompt routing architecture with local WASM and Groq API fallback flows.</desc>
  
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A" />
      <stop offset="50%" stop-color="#121829" />
      <stop offset="100%" stop-color="#070A12" />
    </linearGradient>

    <!-- Dot Grid Pattern -->
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#1F293D" fill-opacity="0.8" />
    </pattern>

    <!-- Glowing Filters -->
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Glowing Gradients -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#84CC16" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrowGlow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 2,2 L 8,5 L 2,8 z" fill="#6366F1" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 2,2 L 8,5 L 2,8 z" fill="#10B981" />
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 2,2 L 8,5 L 2,8 z" fill="#F97316" />
    </marker>
  </defs>

  <!-- Deep Tech Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <!-- Flow Lines (Background Curves) -->
  <!-- Top to Detector -->
  <path d="M 450,105 L 450,145" fill="none" stroke="#6366F1" stroke-width="2.5" marker-end="url(#arrowGlow)" stroke-dasharray="4 4" />
  
  <!-- Detector to Classifier -->
  <path d="M 450,210 L 450,250" fill="none" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrowGlow)" />
  
  <!-- Classifier to Decision Gate -->
  <path d="M 450,325 L 450,365" fill="none" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrowGreen)" />
  
  <!-- Decision Gate to Local Template (Left Curve) -->
  <path d="M 410,405 C 320,405 270,405 240,405" fill="none" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrowGreen)" />
  
  <!-- Decision Gate to Groq Fallback (Right Curve) -->
  <path d="M 490,405 C 580,405 630,405 660,405" fill="none" stroke="#F97316" stroke-width="2.5" marker-end="url(#arrowOrange)" stroke-dasharray="3 3" />

  <!-- Merge Curves back to Technique Router -->
  <!-- Local Template down to Router -->
  <path d="M 145,435 C 145,515 230,515 275,515" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)" />
  <!-- Groq down to Router -->
  <path d="M 755,435 C 755,515 670,515 625,515" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowOrange)" />

  <!-- Router to Output Box -->
  <path d="M 450,550 L 450,590" fill="none" stroke="#6366F1" stroke-width="2.5" marker-end="url(#arrowGlow)" />


  <!-- ==================== DIAGRAM CARDS ==================== -->

  <!-- NODE 1: User Prompt Input -->
  <g transform="translate(300, 40)" filter="url(#glowPurple)">
    <rect width="300" height="65" rx="12" fill="url(#slateGrad)" stroke="url(#purpleGrad)" stroke-width="1.5" />
    <!-- Input Icon -->
    <path d="M 25,23 H 45 M 25,33 H 40 M 25,43 H 35 M 48,20 V 45" fill="none" stroke="#A855F7" stroke-width="2" stroke-linecap="round" />
    <text x="70" y="28" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">User Prompt Input</text>
    <text x="70" y="46" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">ChatGPT • Claude • Gemini Editor</text>
    <!-- Accent Pill -->
    <rect x="235" y="10" width="50" height="16" rx="8" fill="#A855F7" fill-opacity="0.15" />
    <text x="260" y="21" fill="#D8B4FE" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" text-anchor="middle">ACTIVE</text>
  </g>

  <!-- NODE 2: Platform & Model Detector -->
  <g transform="translate(300, 145)" filter="url(#glowBlue)">
    <rect width="300" height="65" rx="12" fill="url(#slateGrad)" stroke="url(#blueGrad)" stroke-width="1.5" />
    <!-- Lens/Search Icon -->
    <circle cx="35" cy="30" r="8" fill="none" stroke="#3B82F6" stroke-width="2" />
    <line x1="41" y1="36" x2="48" y2="43" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
    <text x="70" y="28" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Model &amp; Platform Detector</text>
    <text x="70" y="46" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Reasoning Model? ➔ Bypass to Light CoT</text>
  </g>

  <!-- NODE 3: Local WASM Classifier -->
  <g transform="translate(250, 250)" filter="url(#glowGreen)">
    <rect width="400" height="75" rx="14" fill="url(#slateGrad)" stroke="url(#greenGrad)" stroke-width="2" />
    <!-- Processor Chip Icon -->
    <rect x="20" y="20" width="30" height="30" rx="4" fill="none" stroke="#10B981" stroke-width="2" />
    <path d="M 30,15 V 20 M 40,15 V 20 M 30,50 V 55 M 40,50 V 55 M 15,30 H 20 M 15,40 H 20 M 50,30 H 55 M 50,40 H 55" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="35" cy="35" r="4" fill="#10B981" />
    <text x="70" y="32" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Offline DistilBERT Engine (ONNX)</text>
    <text x="70" y="50" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Runs locally via WebAssembly • 15MB Model • F1 0.855</text>
    <!-- Secure Pill Badge -->
    <rect x="300" y="8" width="85" height="18" rx="9" fill="#10B981" fill-opacity="0.15" />
    <text x="342" y="20" fill="#34D399" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" text-anchor="middle">🔒 OFFLINE-FIRST</text>
  </g>

  <!-- DECISION DIAMOND: Confidence Gate -->
  <g transform="translate(410, 365)">
    <polygon points="40,0 80,40 40,80 0,40" fill="#1E293B" stroke="#6366F1" stroke-width="1.5" />
    <text x="40" y="38" fill="#F1F5F9" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" text-anchor="middle">CONFIDENCE</text>
    <text x="40" y="50" fill="#A5B4FC" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" text-anchor="middle">≥ 55%?</text>
  </g>

  <!-- Decision Path Labels -->
  <text x="320" y="398" fill="#34D399" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">YES (Local Classify)</text>
  <text x="580" y="398" fill="#F97316" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">NO (Cloud Fallback)</text>

  <!-- NODE 4a: Local Cognitive Templates -->
  <g transform="translate(50, 365)" filter="url(#glowGreen)">
    <rect width="190" height="70" rx="12" fill="url(#slateGrad)" stroke="url(#greenGrad)" stroke-width="1.5" />
    <!-- Template Icon -->
    <rect x="20" y="23" width="20" height="24" rx="2" fill="none" stroke="#10B981" stroke-width="2" />
    <line x1="25" y1="29" x2="35" y2="29" stroke="#10B981" stroke-width="1.5" />
    <line x1="25" y1="35" x2="35" y2="35" stroke="#10B981" stroke-width="1.5" />
    <text x="55" y="35" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Local Prompts</text>
    <text x="55" y="50" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Instant • Zero Latency</text>
  </g>

  <!-- NODE 4b: Groq Cloud Fallback (Right Side) -->
  <g transform="translate(660, 365)" filter="url(#glowOrange)">
    <rect width="190" height="70" rx="12" fill="url(#slateGrad)" stroke="url(#orangeGrad)" stroke-width="1.5" />
    <!-- Cloud/Lightning Icon -->
    <path d="M 23,38 C 21,38 18,36 18,33 C 18,29 22,27 25,27 C 26,23 30,20 35,20 C 40,20 44,24 44,28 C 47,29 49,32 48,35 C 47,38 44,38 42,38 Z" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
    <path d="M 33,26 L 27,33 H 34 L 29,39" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-linejoin="round" />
    <text x="60" y="35" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Groq API Fallback</text>
    <text x="60" y="50" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Llama-3.3-70B</text>
  </g>

  <!-- NODE 5: Dynamic Technique Router -->
  <g transform="translate(275, 480)" filter="url(#glowPurple)">
    <rect width="350" height="70" rx="14" fill="url(#slateGrad)" stroke="url(#purpleGrad)" stroke-width="1.5" />
    <!-- Branching Icon -->
    <circle cx="28" cy="35" r="4" fill="#A855F7" />
    <path d="M 32,35 H 42 M 42,35 C 45,35 48,25 54,25 H 60 M 42,35 C 45,35 48,45 54,45 H 60" fill="none" stroke="#A855F7" stroke-width="2" />
    <circle cx="62" cy="25" r="3" fill="#6366F1" />
    <circle cx="62" cy="45" r="3" fill="#06B6D4" />
    <text x="80" y="32" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Dynamic Technique Router</text>
    <text x="80" y="50" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Maps query category to 1 of 17 cognitive techniques</text>
  </g>

  <!-- NODE 6: Glassmorphic Output Box -->
  <g transform="translate(225, 590)" filter="url(#glowBlue)">
    <rect width="450" height="60" rx="12" fill="url(#slateGrad)" stroke="url(#blueGrad)" stroke-width="1.5" />
    <!-- Check/Spark Icon -->
    <path d="M 22,30 L 27,35 L 40,23" fill="none" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="55" y="27" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Enhanced Prompt &amp; Explanation UI injected</text>
    <text x="55" y="44" fill="#67E8F9" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Displays Technique • Rationale • Token Multipliers • Citations</text>
  </g>

</svg>
